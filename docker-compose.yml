services:
  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: artha
      POSTGRES_PASSWORD: artha
      POSTGRES_DB: artha
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artha"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata: