# =============================================================================
# PostgreSQL Configuration for Local Development
# =============================================================================
# These settings optimize PostgreSQL for development environments with
# connection pool compatibility for common ORMs (Drizzle, Prisma, etc.)
# =============================================================================

# -----------------------------------------------------------------------------
# Connection Settings
# -----------------------------------------------------------------------------

# Maximum number of concurrent connections
# Set to 100 to accommodate connection pools from ORMs
max_connections = 100

# Connection pooling via pgBouncer (if used)
# listen_addresses = '*'

# -----------------------------------------------------------------------------
# Memory Settings
# -----------------------------------------------------------------------------

# Shared memory for PostgreSQL (25% of available RAM for dev)
shared_buffers = 256MB

# Memory for sorting and hashing operations
work_mem = 16MB

# Memory for maintenance operations (VACUUM, CREATE INDEX)
maintenance_work_mem = 64MB

# Effective cache size (75% of available RAM for query planner)
effective_cache_size = 768MB

# -----------------------------------------------------------------------------
# Write-Ahead Logging (WAL)
# -----------------------------------------------------------------------------

# WAL level for replication (minimal for dev)
wal_level = replica

# Sync method (fsync for data durability)
fsync = on

# Synchronous commit (off for dev performance, on for production)
synchronous_commit = off

# Checkpoint segments
max_wal_size = 1GB
min_wal_size = 256MB

# Checkpoint timeout
checkpoint_timeout = 10min
checkpoint_completion_target = 0.9

# -----------------------------------------------------------------------------
# Query Planner
# -----------------------------------------------------------------------------

# Random page cost (lower for SSD)
random_page_cost = 1.1

# Effective IO concurrency (SSD optimized)
effective_io_concurrency = 200

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------

# Log destination
log_destination = 'stderr'

# Log collection
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB

# Log queries slower than 1 second
log_min_duration_statement = 1000

# Log connections/disconnections
log_connections = on
log_disconnections = on

# Log lock waits
log_lock_waits = on

# -----------------------------------------------------------------------------
# Locale and Formatting
# -----------------------------------------------------------------------------

# Date/time style
datestyle = 'iso, mdy'

# Timezone
timezone = 'UTC'

# -----------------------------------------------------------------------------
# ORM Compatibility
# -----------------------------------------------------------------------------

# Allow ORMs to use RETURNING clause efficiently
# (default settings work well)

# Support for advisory locks (used by some migration tools)
max_locks_per_transaction = 256

# -----------------------------------------------------------------------------
# Development Optimizations
# -----------------------------------------------------------------------------

# Auto-explain for query analysis (optional)
# shared_preload_libraries = 'auto_explain'
# auto_explain.log_min_duration = '1s'

# Parallel query settings
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_parallel_maintenance_workers = 2

# -----------------------------------------------------------------------------
# Security
# -----------------------------------------------------------------------------

# Password encryption
password_encryption = scram-sha-256

# SSL (disabled for local dev, enable for production)
ssl = off

# -----------------------------------------------------------------------------
# Autovacuum
# -----------------------------------------------------------------------------

autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
